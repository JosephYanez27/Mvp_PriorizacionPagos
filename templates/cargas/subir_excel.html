<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>Subir Excel</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        .card{
            background:white;
            width:400px;
            padding:30px;
            border-radius:10px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="card">

    <h2>Subir Excel</h2>

    <form
        method="POST"
        action="/api/cargas/excel/"
        enctype="multipart/form-data"
    >

        {% csrf_token %}

    <input type="file" name="archivo">

        <br><br>

        <button type="submit">
            Subir
        </button>

    </form>

</div>

</body>
</html>
